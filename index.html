<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="register">
      <h1>Tic Tac Toe</h1>
      <div class="field">
        <label>Player 1:</label>
        <input type="text" id="name1-input" placeholder="Enter name" />
      </div>
      <div class="field">
        <label>Player 2:</label>
        <input type="text" id="name2-input" placeholder="Enter name" />
      </div>
      <button onclick="goToGame()">Start Game</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
