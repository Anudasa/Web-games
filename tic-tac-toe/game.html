<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grid</title>
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <div class="layout">
        <div class="side-panel">
            <h2 id="player1-heading"></h2>
            <p id="player1-symbol"></p>
        </div>

        <div class="container">
            <h1 class="title">Tic Tac Toe</h1>
            <div class="grid">
                <div class="cell" data-index="0"><button class="btn" onclick="handleClick(0)"></button></div>
                <div class="cell" data-index="1"><button class="btn" onclick="handleClick(1)"></button></div>
                <div class="cell" data-index="2"><button class="btn" onclick="handleClick(2)"></button></div>
                <div class="cell" data-index="3"><button class="btn" onclick="handleClick(3)"></button></div>
                <div class="cell" data-index="4"><button class="btn" onclick="handleClick(4)"></button></div>
                <div class="cell" data-index="5"><button class="btn" onclick="handleClick(5)"></button></div>
                <div class="cell" data-index="6"><button class="btn" onclick="handleClick(6)"></button></div>
                <div class="cell" data-index="7"><button class="btn" onclick="handleClick(7)"></button></div>
                <div class="cell" data-index="8"><button class="btn" onclick="handleClick(8)"></button></div>
            </div>  
        </div>
        
        <div class="side-panel">
            <h2 id="player2-heading"></h2>
            <p id="player2-symbol"></p>
        </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
